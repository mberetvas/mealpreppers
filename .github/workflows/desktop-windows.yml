name: Desktop Windows

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'server/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'bun.lock'
      - 'nuxt.config.ts'
      - '.github/workflows/desktop-windows.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'server/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'bun.lock'
      - 'nuxt.config.ts'
      - '.github/workflows/desktop-windows.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

  build-installer:
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri installer
        run: bun run desktop:build

      - name: Locate installer artifact
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Include *.exe,*.msi | Select-Object -First 1
          if (-not $installer) {
            throw 'Installer artifact not found under src-tauri/target/release/bundle'
          }
          "path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Authenticode sign (optional)
        if: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $timestamp = if ($env:WINDOWS_TIMESTAMP_URL) { $env:WINDOWS_TIMESTAMP_URL } else { 'http://timestamp.digicert.com' }
          & signtool sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr $timestamp /td sha256 /fd sha256 "${{ steps.installer.outputs.path }}"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: mealprepper-windows-installer
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error
